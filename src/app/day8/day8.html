<p>Day 8 Todo List</p>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Completed</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        @for(todo of mydata; track todo.id) {
        <tr>
            <td>{{todo.id}}</td>
            <td>{{todo.title}}</td>
            <td>{{todo.completed ? 'Yes' : 'No'}}</td>
            <td>
                <button class="btn btn-warning" (click)="editTodo(todo.id)">Edit</button>
            </td>
        </tr>
        }
    </tbody>
</table>

<hr>

@if (dataedit) {
    <h2>Editing: {{ dataedit?.title }}</h2>
    <form (ngSubmit)="saveUpdate()">
        <label for="title">Title:</label>
        <input id="title" [(ngModel)]="dataedit.title" name="title" required> 
        <br>

        <label for="completed">Completed:</label>
        <input type="checkbox" id="completed" [(ngModel)]="dataedit.completed" name="completed"> 
        <br>

        <button type="submit" class="btn btn-success">Save Changes</button>
        <button type="button" class="btn btn-secondary" (click)="dataedit = null">Cancel</button>
    </form>
} @else {
    <p>Select a task from the table to edit it.</p>
}

<hr>
<pre>{{ dataedit | json }}</pre>
